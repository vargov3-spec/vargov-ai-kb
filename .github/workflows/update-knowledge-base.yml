name: Update Vargov Design knowledge base

on:
  schedule:
    - cron: "0 4 * * 1"  # every Monday 04:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scrape + build pipeline
        run: python scripts/run_all.py

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes detected in the catalog — nothing to commit."
          else
            git commit -m "Automated catalog refresh from vargov.ru [skip ci]"
            git push
          fi

      - name: Upload scan logs as artifact (for debugging failed/unresolved items)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-logs
          path: |
            scan/failed_urls.txt
            scan/en_unresolved.txt
          if-no-files-found: ignore
